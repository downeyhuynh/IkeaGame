<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IKEA Scavenger Hunt</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f5f7fb, #e8eefc);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 980px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #0058a3, #ffda1a);
      padding: 28px 24px;
      color: white;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      letter-spacing: 0.5px;
    }

    .header p {
      margin: 0;
      max-width: 700px;
      line-height: 1.5;
      color: rgba(255,255,255,0.95);
    }

    .content {
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .stat-card h2 {
      margin: 0;
      font-size: 1.8rem;
      color: #0058a3;
    }

    .stat-card p {
      margin: 8px 0 0;
      font-size: 0.95rem;
      color: #4b5563;
    }

    .riddle-box {
      background: #ffffff;
      border: 2px solid #dbeafe;
      border-radius: 18px;
      padding: 24px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .badge {
      display: inline-block;
      width: fit-content;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    .riddle-text {
      font-size: 1.5rem;
      line-height: 1.45;
      font-weight: 700;
      margin: 0;
    }

    .subtext {
      margin-top: 14px;
      color: #6b7280;
      font-size: 0.98rem;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .complete-btn { background: #10b981; color: white; }
    .skip-btn { background: #f59e0b; color: white; }
    .reset-btn { background: #ef4444; color: white; }
    .photo-btn { background: #2563eb; color: white; }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .history-section {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 16px;
    }

    .panel h3 {
      margin: 0 0 12px;
      font-size: 1.05rem;
    }

    #completedList {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 10px;
    }

    .submission-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    .submission-card {
      background: white;
      border: 1px solid #dbe3ef;
      border-radius: 14px;
      padding: 8px;
    }

    .submission-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      cursor: pointer;
    }

    .submission-caption {
      font-size: 0.78rem;
      line-height: 1.3;
      color: #475569;
      margin-top: 8px;
      max-height: 3.2em;
      overflow: hidden;
    }

    .hidden-input {
      display: none;
    }

    .photo-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.82);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 2000;
    }

    .photo-overlay.active {
      display: flex;
    }

    .photo-overlay-content {
      background: white;
      border-radius: 18px;
      padding: 16px;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .photo-overlay-content img {
      max-width: 100%;
      max-height: 72vh;
      border-radius: 12px;
      object-fit: contain;
    }

    .overlay-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-weight: bold;
    }

    @media (max-width: 860px) {
      .stats {
        grid-template-columns: repeat(3, 1fr);
      }

      .history-section {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .riddle-text {
        font-size: 1.22rem;
      }

      .content {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="startScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0058a3,#ffda1a);display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;z-index:999;">
    <h1 style="font-size:2.5rem;margin-bottom:20px;">IKEA Scavenger Hunt</h1>
    <button id="startGameBtn" style="padding:16px 28px;font-size:1.2rem;border:none;border-radius:12px;cursor:pointer;font-weight:bold;">Start Game</button>
  </div>
  <div class="app">
    <div class="header">
      <h1>IKEA Scavenger Hunt</h1>
      <p>Complete challenges or skip — but you only get 3 skips!</p>
    </div>

    <div class="content">
      <div class="stats">
        <div class="stat-card"><h2 id="completedCount">0</h2><p>Completed</p></div>
        <div class="stat-card"><h2 id="skippedCount">0</h2><p>Used Skips</p></div>
        <div class="stat-card"><h2 id="remainingSkips">3</h2><p>Skips Left</p></div>
        <div class="stat-card"><h2 id="caughtCount">0</h2><p>Caught</p></div>
        <div class="stat-card"><h2 id="remainingCount">50</h2><p>Remaining</p></div>
        <div class="stat-card"><h2 id="seenCount">0</h2><p>Seen</p></div>
      </div>

      <div class="riddle-box">
        <div class="badge" id="challengeNumber">Challenge Ready</div>
        <p class="riddle-text" id="riddleText">Press start to begin.</p>
        <div class="subtext" id="statusText">Take a photo to prove it.</div>
      </div>

      <div class="buttons">
        <button class="complete-btn" id="startOrCompleteBtn">Start / Complete</button>
        <button class="skip-btn" id="skipBtn">Skip</button>
        <button class="photo-btn" id="addPhotoBtn">Take / Choose Photo</button>
        <button class="reset-btn" id="caughtBtn">Caught</button>
        <button class="reset-btn" id="resetBtn">Reset</button>
      </div>

      <input class="hidden-input" type="file" id="photoInput" accept="image/*" capture="environment" />

      <div class="history-section">
        <div class="panel">
          <h3>Completed Challenges</h3>
          <ol id="completedList"></ol>
        </div>
        <div class="panel">
          <h3>Photo Submissions</h3>
          <div id="submissionGrid" class="submission-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'ikeaScavengerHuntState_v2';
    const ACCESS_KEY = 'ikeaScavengerHuntAccess_v1';

    const riddles = [
      "Take a photo of your group pretending to have a very serious business meeting on a couch.",
      "Take a photo of everyone acting like mannequins in a display room.",
      "Take a photo of your group fake-sleeping dramatically in a bed display.",
      "Take a photo of one person being ‘the chef’ and others reacting like a cooking show audience.",
      "Take a photo of your group arguing over a couch like it’s the last one on Earth.",
      "Take a photo of someone proposing to a piece of furniture.",
      "Take a photo of your group acting like a happy family in a living room.",
      "Take a photo of everyone hiding behind furniture like spies.",
      "Take a photo of your group doing a fashion runway walk in a display area.",
      "Take a photo of your group pretending the floor is lava.",
      "Take a photo of someone lifting a tiny item like it’s extremely heavy.",
      "Take a photo of your group reacting like they just saw a ghost in a bedroom.",
      "Take a photo of your group doing a synchronized pose on chairs.",
      "Take a photo of someone being tucked into bed by the group.",
      "Take a photo of your group pretending to watch TV very intensely.",
      "Take a photo of your group acting like they’re in a horror movie scene.",
      "Take a photo of everyone pointing at one person like they’re the main character.",
      "Take a photo of your group pretending to have a pillow fight.",
      "Take a photo of your group acting like they’re late for something important.",
      "Take a photo of your group posing like a band album cover.",
      "Take a photo of someone sitting like royalty on a chair with others bowing.",
      "Take a photo of your group acting like they just got bad news.",
      "Take a photo of your group pretending to be influencers reviewing furniture.",
      "Take a photo of your group doing their best superhero poses.",
      "Take a photo of your group acting like they’re lost in IKEA.",
      "Take a photo of someone dramatically fainting into furniture.",
      "Take a photo of your group acting like a family dinner gone wrong.",
      "Take a photo of your group pretending to be detectives investigating a room.",
      "Take a photo of your group copying the exact pose of mannequins.",
      "Take a photo of your group acting like they’re in a commercial.",
      "Take a photo of your group pretending to fight over the remote.",
      "Take a photo of your group acting like they’re freezing cold in a bedroom.",
      "Take a photo of your group pretending to sneak food.",
      "Take a photo of your group acting like they’re exhausted after a long day.",
      "Take a photo of your group posing like a movie poster.",
      "Take a photo of your group pretending to move furniture dramatically.",
      "Take a photo of your group acting like they’re in a romantic scene.",
      "Take a photo of your group reacting like they found something shocking.",
      "Take a photo of your group pretending to be on a game show.",
      "Take a photo of your group acting like they’re gossiping.",
      "Take a photo of your group pretending to be robots.",
      "Take a photo of your group acting like they’re late for class.",
      "Take a photo of your group doing a freeze-frame mid-action.",
      "Take a photo of your group pretending to be statues.",
      "Take a photo of your group acting like they’re celebrating something big.",
      "Take a photo of your group pretending to be in a dramatic breakup scene.",
      "Take a photo of your group acting like they’re on vacation in IKEA.",
      "Take a photo of your group pretending to be furniture salespeople.",
      "Take a photo of your group doing their funniest face all at once.",
      "Take a photo of your group acting like they’re the main characters in a sitcom."
    ];

    let availableRiddles = [...riddles];
    let currentRiddle = null;
    let completedCount = 0;
    let skippedCount = 0;
    let caughtCount = 0;
    let maxSkips = 3;
    let seenCount = 0;
    let timeoutEnd = null;
    let timeoutInterval = null;
    let completedItems = [];
    let photoSubmissions = [];
    let pendingPhotoData = null;

    const skipBtn = document.getElementById('skipBtn');
    const startOrCompleteBtn = document.getElementById('startOrCompleteBtn');
    const addPhotoBtn = document.getElementById('addPhotoBtn');
    const photoInput = document.getElementById('photoInput');
    const statusText = document.getElementById('statusText');
    const challengeNumber = document.getElementById('challengeNumber');
    const riddleText = document.getElementById('riddleText');
    const completedList = document.getElementById('completedList');
    const submissionGrid = document.getElementById('submissionGrid');
    const startScreen = document.getElementById('startScreen');
    const startGameBtn = document.getElementById('startGameBtn');

    const photoOverlay = document.createElement('div');
    photoOverlay.className = 'photo-overlay';
    photoOverlay.innerHTML = `
      <div class="photo-overlay-content">
        <div class="overlay-top">
          <span id="overlayCaption">Photo Preview</span>
          <button id="closeOverlayBtn" class="reset-btn">Close</button>
        </div>
        <img id="overlayImage" alt="Submission preview" />
      </div>
    `;
    document.body.appendChild(photoOverlay);

    const overlayImage = document.getElementById('overlayImage');
    const overlayCaption = document.getElementById('overlayCaption');
    const closeOverlayBtn = document.getElementById('closeOverlayBtn');

    function saveAccessGranted() {
      localStorage.setItem(ACCESS_KEY, 'true');
    }

    function hasSavedAccess() {
      return localStorage.getItem(ACCESS_KEY) === 'true';
    }

    function clearSavedAccess() {
      localStorage.removeItem(ACCESS_KEY);
    }

    function saveState() {
      const state = {
        availableRiddles,
        currentRiddle,
        completedCount,
        skippedCount,
        caughtCount,
        maxSkips,
        seenCount,
        timeoutEnd,
        completedItems,
        photoSubmissions,
        pendingPhotoData
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;

      try {
        const state = JSON.parse(raw);
        availableRiddles = Array.isArray(state.availableRiddles) ? state.availableRiddles : [...riddles];
        currentRiddle = typeof state.currentRiddle === 'string' ? state.currentRiddle : null;
        completedCount = Number.isInteger(state.completedCount) ? state.completedCount : 0;
        skippedCount = Number.isInteger(state.skippedCount) ? state.skippedCount : 0;
        caughtCount = Number.isInteger(state.caughtCount) ? state.caughtCount : 0;
        maxSkips = Number.isInteger(state.maxSkips) ? state.maxSkips : 3;
        seenCount = Number.isInteger(state.seenCount) ? state.seenCount : 0;
        timeoutEnd = typeof state.timeoutEnd === 'number' ? state.timeoutEnd : null;
        completedItems = Array.isArray(state.completedItems) ? state.completedItems : [];
        photoSubmissions = Array.isArray(state.photoSubmissions) ? state.photoSubmissions : [];
        pendingPhotoData = typeof state.pendingPhotoData === 'string' ? state.pendingPhotoData : null;
        return true;
      } catch (error) {
        console.error('Could not load saved game state.', error);
        return false;
      }
    }

    function renderCompletedList() {
      completedList.innerHTML = '';
      completedItems.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        completedList.appendChild(li);
      });
    }

    function renderSubmissions() {
      submissionGrid.innerHTML = '';

      if (!photoSubmissions.length) {
        submissionGrid.innerHTML = '<div style="color:#64748b;font-size:0.92rem;">No photos yet.</div>';
        return;
      }

      photoSubmissions.slice().reverse().forEach((submission, index) => {
        const card = document.createElement('div');
        card.className = 'submission-card';

        const img = document.createElement('img');
        img.src = submission.image;
        img.alt = submission.prompt || 'Submission photo';
        img.onclick = () => openOverlay(submission.image, submission.prompt || `Submission ${photoSubmissions.length - index}`);

        const caption = document.createElement('div');
        caption.className = 'submission-caption';
        caption.textContent = submission.prompt || 'Untitled submission';

        card.appendChild(img);
        card.appendChild(caption);
        submissionGrid.appendChild(card);
      });
    }

    function openOverlay(src, caption) {
      overlayImage.src = src;
      overlayCaption.textContent = caption;
      photoOverlay.classList.add('active');
    }

    function closeOverlay() {
      photoOverlay.classList.remove('active');
    }

    closeOverlayBtn.onclick = closeOverlay;
    photoOverlay.onclick = (event) => {
      if (event.target === photoOverlay) closeOverlay();
    };

    function updateStats() {
      document.getElementById('completedCount').textContent = completedCount;
      document.getElementById('skippedCount').textContent = skippedCount;
      document.getElementById('remainingSkips').textContent = Math.max(0, maxSkips - skippedCount);
      document.getElementById('caughtCount').textContent = caughtCount;
      document.getElementById('remainingCount').textContent = availableRiddles.length;
      document.getElementById('seenCount').textContent = seenCount;
    }

    function isTimedOut() {
      return timeoutEnd && Date.now() < timeoutEnd;
    }

    function setGameDisabled(disabled) {
      startOrCompleteBtn.disabled = disabled;
      addPhotoBtn.disabled = disabled;
      skipBtn.disabled = disabled || skippedCount >= maxSkips;
    }

    function formatTimeLeft(ms) {
      const totalSeconds = Math.ceil(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function refreshTimer() {
      const remainingMs = timeoutEnd - Date.now();
      if (remainingMs <= 0) {
        clearInterval(timeoutInterval);
        timeoutInterval = null;
        timeoutEnd = null;
        statusText.textContent = 'Time out is over. You can play again.';
        setGameDisabled(false);
        saveState();
        return;
      }

      statusText.textContent = `Caught! Time out: ${formatTimeLeft(remainingMs)} remaining.`;
    }

    function startTimeout() {
      const durationMinutes = caughtCount;
      const durationMs = durationMinutes * 60 * 1000;

      timeoutEnd = Date.now() + durationMs;
      setGameDisabled(true);
      clearInterval(timeoutInterval);

      function refreshCaughtTimer() {
        const remainingMs = timeoutEnd - Date.now();
        if (remainingMs <= 0) {
          clearInterval(timeoutInterval);
          timeoutInterval = null;
          timeoutEnd = null;
          statusText.textContent = 'Time out is over. You can play again.';
          setGameDisabled(false);
          saveState();
          return;
        }
        statusText.textContent = `Caught (${durationMinutes} min penalty)! Time out: ${formatTimeLeft(remainingMs)} remaining.`;
      }

      refreshCaughtTimer();
      timeoutInterval = setInterval(refreshCaughtTimer, 250);
      saveState();
    }

    function restoreTimeoutIfNeeded() {
      clearInterval(timeoutInterval);
      timeoutInterval = null;

      if (isTimedOut()) {
        setGameDisabled(true);
        const activePenaltyMinutes = Math.max(1, caughtCount);
        function refreshCaughtTimer() {
          const remainingMs = timeoutEnd - Date.now();
          if (remainingMs <= 0) {
            clearInterval(timeoutInterval);
            timeoutInterval = null;
            timeoutEnd = null;
            statusText.textContent = 'Time out is over. You can play again.';
            setGameDisabled(false);
            saveState();
            return;
          }
          statusText.textContent = `Caught (${activePenaltyMinutes} min penalty)! Time out: ${formatTimeLeft(remainingMs)} remaining.`;
        }
        refreshCaughtTimer();
        timeoutInterval = setInterval(refreshCaughtTimer, 250);
      } else {
        timeoutEnd = null;
      }
    }

    function renderGameState() {
      renderCompletedList();
      renderSubmissions();
      updateStats();

      if (currentRiddle) {
        challengeNumber.textContent = `Challenge ${seenCount}`;
        riddleText.textContent = currentRiddle;
      } else if (availableRiddles.length === 0 && seenCount > 0) {
        challengeNumber.textContent = 'Finished';
        riddleText.textContent = 'All challenges have been used.';
        statusText.textContent = 'Press reset to start over.';
      } else {
        challengeNumber.textContent = 'Challenge Ready';
        riddleText.textContent = 'Press start to begin.';
      }

      if (!currentRiddle && availableRiddles.length > 0 && !isTimedOut() && seenCount > 0) {
        statusText.textContent = 'Press Start / Complete to get the next challenge.';
      }

      if (!currentRiddle && availableRiddles.length > 0 && seenCount === 0 && !isTimedOut()) {
        statusText.textContent = 'Press Start / Complete to get your first challenge.';
      }

      if (currentRiddle && !pendingPhotoData && !isTimedOut()) {
        statusText.textContent = 'Take or choose a photo before completing this challenge.';
      }

      if (currentRiddle && pendingPhotoData && !isTimedOut()) {
        statusText.textContent = 'Photo ready. Press Start / Complete to submit this challenge.';
      }

      if (availableRiddles.length === 0) {
        setGameDisabled(true);
      } else {
        setGameDisabled(false);
      }

      restoreTimeoutIfNeeded();
      updateStats();
    }

    function pickRandomRiddle() {
      if (availableRiddles.length === 0) {
        currentRiddle = null;
        riddleText.textContent = 'All challenges have been used.';
        challengeNumber.textContent = 'Finished';
        statusText.textContent = 'Press reset to start over.';
        setGameDisabled(true);
        updateStats();
        saveState();
        return;
      }

      const index = Math.floor(Math.random() * availableRiddles.length);
      currentRiddle = availableRiddles.splice(index, 1)[0];
      pendingPhotoData = null;
      seenCount++;
      challengeNumber.textContent = `Challenge ${seenCount}`;
      riddleText.textContent = currentRiddle;
      if (!isTimedOut()) {
        statusText.textContent = 'Take or choose a photo before completing this challenge.';
      }
      updateStats();
      saveState();
    }

    function requireCurrentChallenge() {
      if (!currentRiddle) {
        alert('Start a challenge first.');
        return false;
      }
      return true;
    }

    addPhotoBtn.onclick = () => {
      if (isTimedOut()) return;
      if (!requireCurrentChallenge()) return;
      photoInput.value = '';
      photoInput.click();
    };

    photoInput.onchange = (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file || !currentRiddle) return;

      const reader = new FileReader();
      reader.onload = () => {
        pendingPhotoData = reader.result;
        statusText.textContent = 'Photo ready. Press Start / Complete to submit this challenge.';
        saveState();
      };
      reader.readAsDataURL(file);
    };

    startOrCompleteBtn.onclick = () => {
      if (isTimedOut()) return;

      if (!currentRiddle) {
        pickRandomRiddle();
        return;
      }

      if (!pendingPhotoData) {
        alert('You need to take or choose a photo before completing this challenge.');
        return;
      }

      completedCount++;
      completedItems.push(currentRiddle);
      photoSubmissions.push({
        prompt: currentRiddle,
        image: pendingPhotoData,
        createdAt: Date.now()
      });
      renderCompletedList();
      renderSubmissions();
      currentRiddle = null;
      pendingPhotoData = null;
      saveState();
      pickRandomRiddle();
    };

    skipBtn.onclick = () => {
      if (isTimedOut()) return;
      if (skippedCount >= maxSkips) return;

      skippedCount++;
      currentRiddle = null;
      pendingPhotoData = null;
      saveState();
      pickRandomRiddle();

      if (skippedCount >= maxSkips) {
        skipBtn.disabled = true;
      }

      updateStats();
      saveState();
    };

    document.getElementById('caughtBtn').onclick = () => {
      const password = prompt('Enter admin password to mark as caught:');
      if (password !== 'Jesus') {
        alert('Incorrect password.');
        return;
      }

      caughtCount++;
      saveState();
      startTimeout();
      updateStats();
    };

    document.getElementById('resetBtn').onclick = () => {
      const password = prompt('Enter admin password to reset:');
      if (password !== 'Jesus') {
        alert('Incorrect password. Reset denied.');
        return;
      }

      localStorage.removeItem(STORAGE_KEY);
      clearSavedAccess();
      availableRiddles = [...riddles];
      currentRiddle = null;
      completedCount = 0;
      skippedCount = 0;
      caughtCount = 0;
      seenCount = 0;
      completedItems = [];
      photoSubmissions = [];
      pendingPhotoData = null;
      clearInterval(timeoutInterval);
      timeoutInterval = null;
      timeoutEnd = null;
      completedList.innerHTML = '';
      submissionGrid.innerHTML = '';
      riddleText.textContent = 'Press start to begin.';
      challengeNumber.textContent = 'Challenge Ready';
      statusText.textContent = 'Press Start / Complete to get your first challenge.';
      setGameDisabled(false);
      updateStats();
      saveState();
    };

    startGameBtn.onclick = () => {
      const password = prompt('Enter password to start the game:');
      if (password !== 'Jesus') {
        alert('Incorrect password.');
        return;
      }
      saveAccessGranted();
      startScreen.style.display = 'none';
    };

    loadState();
    renderGameState();

    if (hasSavedAccess()) {
      startScreen.style.display = 'none';
    }
  </script>
</body>
</html>
